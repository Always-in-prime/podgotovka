<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шпаргалка по БД и программированию (уникальные задания)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f1f5f9;
            padding: 20px;
            color: #0f172a;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            border-bottom: 3px solid #2563eb;
            padding-bottom: 10px;
            display: inline-block;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        /* Фильтры */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 15px 25px;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .filters input, .filters select, .filters label {
            font-size: 0.95rem;
        }
        .filters input[type="text"] {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            min-width: 200px;
        }
        .filters select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        .filters label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: 0.15s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }
        .card-number {
            font-weight: 700;
            font-size: 0.75rem;
            color: #2563eb;
            background: #eff6ff;
            border-radius: 20px;
            padding: 2px 12px;
            display: inline-block;
            width: fit-content;
            margin-bottom: 8px;
        }
        .card-category {
            font-size: 0.7rem;
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 12px;
            color: #475569;
            display: inline-block;
            margin-left: 8px;
        }
        .card-short {
            font-size: 0.92rem;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 12px;
        }
        .card-duplicate {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .btn-detail {
            background: #2563eb;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            align-self: flex-start;
            transition: background 0.2s;
        }
        .btn-detail:hover { background: #1d4ed8; }
        .card.hidden { display: none; }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 860px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px 32px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #94a3b8;
            line-height: 1;
        }
        .close-btn:hover { color: #1e293b; }
        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #0f172a;
            padding-right: 30px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .section h3:hover { color: #2563eb; }
        .section h3 .arrow {
            transition: transform 0.2s;
            display: inline-block;
        }
        .section h3 .arrow.collapsed { transform: rotate(-90deg); }
        .section-content {
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #2563eb;
            margin-top: 2px;
            overflow-x: auto;
        }
        .section-content.sql {
            font-family: 'Courier New', monospace;
            background: #1e293b;
            color: #e2e8f0;
            border-left-color: #facc15;
        }
        .section-content.sql .kw { color: #facc15; }
        .section-content.sql .fn { color: #60a5fa; }
        .section-content.sql .str { color: #a3e635; }
        .section-content.sql .cmt { color: #94a3b8; }
        .section-content.sql .num { color: #f472b6; }
        .section-content table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .section-content table th {
            background: #2563eb;
            color: white;
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
        }
        .section-content table td, .section-content table th {
            border: 1px solid #cbd5e1;
            padding: 6px 10px;
        }
        .section-content table tr:nth-child(even) { background: #f1f5f9; }
        .section-content table tr:hover { background: #e2e8f0; }
        .section-content.hidden { display: none; }
        @media (max-width: 600px) {
            .cards-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 20px; }
            .filters { flex-direction: column; align-items: stretch; }
            .filters input[type="text"] { min-width: auto; }
        }
        /* Оглавление */
        .toc {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .toc a {
            display: inline-block;
            padding: 2px 8px;
            background: #e2e8f0;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #1e293b;
            text-decoration: none;
            transition: 0.2s;
        }
        .toc a:hover { background: #2563eb; color: white; }
        .toc a.duplicate { background: #f1f5f9; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Уникальные задания — БД и программирование</h1>
        <p style="color: #475569;">40 уникальных заданий + ссылки на повторы</p>

    <div id="cards" class="cards-grid"></div>
</div>

<!-- Модалка -->

            sql: "1. SELECT ID_Клиента, COUNT(*) FROM Страховки GROUP BY ID_Клиента HAVING COUNT(*) >= 2;\n2. DELETE FROM Страховки WHERE Статус='завершена' AND Выплачено=TRUE;",
            sample: `<table><tr><th>Клиент</th><th>Кол-во</th></tr><tr><td>Смирнов В.</td><td>2</td></tr></table>`
        },
        {
            number: 40,
            category: "sql",
            short: "Студенты-хорошисты кафедры «Программная инженерия» от Я до А.",
            task: "Вывести студентов-хорошистов (средний балл 3.0–4.0) этой кафедры, упорядочить по убыванию фамилии.",
            tables: "• Студенты (ID, ФИО, Кафедра, Средний_балл)",
            sql: "SELECT * FROM Студенты WHERE Кафедра='Программная инженерия' AND Средний_балл BETWEEN 3.0 AND 4.0 ORDER BY ФИО DESC;",
            sample: `<table><tr><th>ФИО</th><th>Балл</th></tr><tr><td>Тихонов А.</td><td>3.8</td></tr></table>`
        }
        // Добавлять новые уникальные задания можно здесь, но для демонстрации оставляем 40.
    ];

    // Создаём массив с дублями, которые будут ссылаться на оригиналы
    // Номера 47,49,51-60 являются дубликатами. Мы добавим их как отдельные записи с полем duplicate_of.
    const duplicates = [
        { number: 47, duplicate_of: 1, short: "Повтор задания 1 (Завод: сводка по полу детей, премии)." },
        { number: 49, duplicate_of: 11, short: "Повтор задания 11 (Жилконтора: 3-комнатные, >4 чел)." },
        { number: 51, duplicate_of: 21, short: "Повтор задания 21 (Подразделение: станки в 3 смены)." },
        { number: 52, duplicate_of: 20, short: "Повтор задания 20 (Гостиница: комнаты кроме повышенного комфорта)." },
        { number: 53, duplicate_of: 23, short: "Повтор задания 23 (Подразделение: средняя стоимость, токарные)." },
        { number: 54, duplicate_of: 26, short: "Повтор задания 26 (Отдел кадров: трудоустроенные после 02.2012)." },
        { number: 55, duplicate_of: 25, short: "Повтор задания 25 (Общежитие: средний возраст, стёкла)." },
        { number: 56, duplicate_of: 28, short: "Повтор задания 28 (Пожилые работники, сортировка)." },
        { number: 57, duplicate_of: 27, short: "Повтор задания 27 (Общежитие: старшие по этажам, должники)." },
        { number: 58, duplicate_of: 30, short: "Повтор задания 30 (Бухгалтерия: максимальный оклад)." },
        { number: 59, duplicate_of: 29, short: "Повтор задания 29 (Общежитие: жильцы комнаты, дети)." },
        { number: 60, duplicate_of: 32, short: "Повтор задания 32 (Студенты-отличники на кафедре Компьютерные науки)." }
    ];

    // Объединяем все данные (основные + дубли)
    const allData = data.concat(duplicates.map(d => {
        // Находим оригинал для копирования full-данных
        const orig = data.find(item => item.number === d.duplicate_of);
        return {
            ...d,
            category: orig ? orig.category : 'sql',
            task: orig ? orig.task : '',
            tables: orig ? orig.tables : '',
            sql: orig ? orig.sql : '',
            sample: orig ? orig.sample : '',
            isDuplicate: true,
            duplicate_of: d.duplicate_of
        };
    }));

    // Сортируем по номеру
    allData.sort((a,b) => a.number - b.number);

    // ------------------------------------------------------------
    // Рендеринг
    // ------------------------------------------------------------
    const cardsContainer = document.getElementById('cards');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const hideDuplicatesCheck = document.getElementById('hideDuplicates');
    const countDisplay = document.getElementById('countDisplay');
    const tocContainer = document.getElementById('tocContainer');

    function renderCards() {
        const search = searchInput.value.toLowerCase();
        const category = categoryFilter.value;
        const hideDup = hideDuplicatesCheck.checked;

        let visibleCount = 0;
        cardsContainer.innerHTML = '';
        allData.forEach(item => {
            // Фильтр по категории
            if (category !== 'all' && item.category !== category) return;
            // Поиск
            const text = (item.short + ' ' + (item.task || '') + ' ' + (item.sql || '')).toLowerCase();
            if (!text.includes(search)) return;
            // Скрыть дубли?
            if (hideDup && item.isDuplicate) return;

            const card = document.createElement('div');
            card.className = 'card';
            if (item.isDuplicate) card.classList.add('duplicate');

            let dupLabel = '';
            if (item.isDuplicate) {
                dupLabel = `<div class="card-duplicate">🔁 Повтор задания ${item.duplicate_of}</div>`;
            }

            card.innerHTML = `
                <div>
                    <span class="card-number">Задание ${item.number}</span>
                    <span class="card-category">${item.category === 'sql' ? 'SQL' : 'Алгоритм'}</span>
                </div>
                ${dupLabel}
                <div class="card-short">${item.short}</div>
                <button class="btn-detail" data-id="${item.number}">Подробнее →</button>
            `;
            cardsContainer.appendChild(card);
            visibleCount++;
        });

        countDisplay.textContent = `Показано: ${visibleCount}`;
        buildToc();
    }

    function buildToc() {
        tocContainer.innerHTML = '';
        allData.forEach(item => {
            if (item.isDuplicate && hideDuplicatesCheck.checked) return;
            const a = document.createElement('a');
            a.href = '#';
            a.textContent = item.number;
            a.dataset.id = item.number;
            if (item.isDuplicate) a.classList.add('duplicate');
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const id = parseInt(e.target.dataset.id);
                openModal(id);
            });
            tocContainer.appendChild(a);
        });
    }

    // Модалка
    function openModal(id) {
        const item = allData.find(d => d.number === id);
        if (!item) return;
        modalTitle.textContent = `Задание ${item.number}${item.isDuplicate ? ' (повтор)' : ''}`;

        let html = '';
        // Задача
        html += `<div class="section">
            <h3 onclick="toggleSection(this)"><span class="arrow">▼</span> 📌 Задача</h3>
            <div class="section-content">${item.task || '—'}</div>
        </div>`;
        // Таблицы
        html += `<div class="section">
            <h3 onclick="toggleSection(this)"><span class="arrow">▼</span> 🗂️ Таблицы</h3>
            <div class="section-content">${item.tables || '—'}</div>
        </div>`;
        // SQL или код
        if (item.category === 'sql' && item.sql && item.sql !== '–') {
            const sqlHighlighted = highlightSQL(item.sql);
            html += `<div class="section">
                <h3 onclick="toggleSection(this)"><span class="arrow">▼</span> ⚡ SQL-запрос</h3>
                <div class="section-content sql">${sqlHighlighted}</div>
            </div>`;
        } else if (item.category === 'algo' && item.sample) {
            html += `<div class="section">
                <h3 onclick="toggleSection(this)"><span class="arrow">▼</span> 💻 Код (Python)</h3>
                <div class="section-content sql">${item.sample.replace(/ /g, '&nbsp;').replace(/\n/g, '<br>')}</div>
            </div>`;
        }
        // Пример результата
        if (item.sample && item.sample.startsWith('<table')) {
            html += `<div class="section">
                <h3 onclick="toggleSection(this)"><span class="arrow">▼</span> 📊 Пример результата</h3>
                <div class="section-content">${item.sample}</div>
            </div>`;
        }

        modalBody.innerHTML = html;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    // Простая подсветка SQL
    function highlightSQL(sql) {
        let s = sql.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const keywords = ['SELECT','FROM','WHERE','JOIN','ON','GROUP BY','ORDER BY','HAVING','DISTINCT','AS','INNER','LEFT','RIGHT','FULL','OUTER','UNION','INTERSECT','EXCEPT','CASE','WHEN','THEN','ELSE','END','AND','OR','NOT','NULL','TRUE','FALSE','IN','BETWEEN','LIKE','EXISTS','COUNT','SUM','AVG','MAX','MIN','YEAR','MONTH','DAY','DATE','CURRENT_DATE','GETDATE','DATEDIFF','INTERVAL','MONTH','YEAR'];
        const functions = ['COUNT','SUM','AVG','MAX','MIN','YEAR','MONTH','DAY','DATEDIFF'];
        // Разбиваем на токены (простейший способ)
        let tokens = s.split(/\b/);
        let result = [];
        for (let tok of tokens) {
            let upper = tok.toUpperCase();
            if (keywords.includes(upper)) {
                result.push(`<span class="kw">${tok}</span>`);
            } else if (functions.includes(upper) && tok.match(/^[A-Z]+$/)) {
                result.push(`<span class="fn">${tok}</span>`);
            } else if (tok.match(/^'.*'$/)) {
                result.push(`<span class="str">${tok}</span>`);
            } else if (tok.match(/^\d+$/)) {
                result.push(`<span class="num">${tok}</span>`);
            } else {
                result.push(tok);
            }
        }
        return result.join('');
    }

    function toggleSection(el) {
        const content = el.nextElementSibling;
        const arrow = el.querySelector('.arrow');
        if (content.classList.contains('hidden')) {
            content.classList.remove('hidden');
            arrow.classList.remove('collapsed');
        } else {
            content.classList.add('hidden');
            arrow.classList.add('collapsed');
        }
    }

    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }

    // События
    searchInput.addEventListener('input', renderCards);
    categoryFilter.addEventListener('change', renderCards);
    hideDuplicatesCheck.addEventListener('change', renderCards);

    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // Инициализация
    renderCards();

    // Делегирование кликов на кнопки "Подробнее"
    cardsContainer.addEventListener('click', function(e) {
        const btn = e.target.closest('.btn-detail');
        if (btn) {
            const id = parseInt(btn.dataset.id);
            if (!isNaN(id)) {
                openModal(id);
            }
        }
    });
</script>
</body>
</html>
