<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шпаргалка по БД и программированию (60 заданий)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f1f5f9;
            padding: 20px;
            color: #0f172a;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            border-bottom: 3px solid #2563eb;
            padding-bottom: 10px;
            display: inline-block;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px 18px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        }
        .card-number {
            font-weight: 700;
            font-size: 0.75rem;
            color: #2563eb;
            background: #eff6ff;
            border-radius: 20px;
            padding: 2px 12px;
            display: inline-block;
            width: fit-content;
            margin-bottom: 8px;
        }
        .card-short {
            font-size: 0.92rem;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 12px;
        }
        .btn-detail {
            background: #2563eb;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            align-self: flex-start;
            transition: background 0.2s;
        }
        .btn-detail:hover {
            background: #1d4ed8;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 820px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px 32px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #94a3b8;
            line-height: 1;
        }
        .close-btn:hover {
            color: #1e293b;
        }
        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #0f172a;
            padding-right: 30px;
        }

        .section {
            margin-bottom: 20px;
        }
        .section h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section h3 span {
            font-size: 1.2rem;
        }
        .section-content {
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 8px;
            border-left: 4px solid #2563eb;
            margin-top: 2px;
        }
        .section-content.sql {
            font-family: 'Courier New', monospace;
            background: #1e293b;
            color: #e2e8f0;
            border-left-color: #facc15;
        }
        .section-content table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        .section-content table th {
            background: #2563eb;
            color: white;
            padding: 8px 10px;
            text-align: left;
            font-weight: 600;
        }
        .section-content table td,
        .section-content table th {
            border: 1px solid #cbd5e1;
            padding: 6px 10px;
        }
        .section-content table tr:nth-child(even) {
            background: #f1f5f9;
        }
        .section-content table tr:hover {
            background: #e2e8f0;
        }

        @media (max-width: 600px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 20px;
            }
            .section-content {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

        </div>
        <div id="cards" class="cards-grid"></div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal" onclick="if(event.target===this) closeModal()">

            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-title" id="modalTitle"></div>
            <div id="modalBody"></div>
        </div>
    </div>

            tables: "• Сотрудники (ID, ФИО, Отдел, ДатаРождения, Пол, Должность, Цех, Премия (да/нет))\n• Дети (ID, ID_Сотр, Имя, Пол, Возраст)",

        const cardsContainer = document.getElementById('cards');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        function renderCards() {
            cardsContainer.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-number">Задание ${item.number}</div>
                    <div class="card-short">${item.short}</div>
                    <button class="btn-detail" data-id="${item.number}">Подробнее →</button>
                `;
                cardsContainer.appendChild(card);
            });
            document.querySelectorAll('.btn-detail').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    openModal(id);
                });
            });
        }

        function openModal(id) {
            const item = data.find(d => d.number === id);
            if (!item) return;

            modalTitle.textContent = `Задание ${item.number}`;
            let html = '';

            // Задача
            html += `<div class="section">
                        <h3><span>📌</span> Задача</h3>
                        <div class="section-content">${item.task || '—'}</div>
                     </div>`;

            // Таблицы
            html += `<div class="section">
                        <h3><span>🗂️</span> Описание таблиц</h3>
                        <div class="section-content">${item.tables || '—'}</div>
                     </div>`;

            // SQL-запрос
            html += `<div class="section">
                        <h3><span>⚡</span> SQL-запрос</h3>
                        <div class="section-content sql">${item.sql || '—'}</div>
                     </div>`;

            // Пример результата (если есть)
            if (item.sample && item.sample.trim() !== '') {
                html += `<div class="section">
                            <h3><span>📊</span> Пример результата</h3>
                            <div class="section-content">${item.sample}</div>
                         </div>`;
            }

            modalBody.innerHTML = html;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        renderCards();
    </script>
