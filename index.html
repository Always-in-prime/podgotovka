<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Хаб заданий</title>
    <style>
        /* ----- Mobile First ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #f0f6fe;
            --bg-end: #e0eaf5;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.5);
            --shadow-soft: 0 6px 24px rgba(0, 20, 40, 0.08);
            --shadow-hover: 0 12px 36px rgba(0, 20, 40, 0.16);
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --text-dark: #0b2a41;
            --text-muted: #3d5a73;
            --radius: 28px;
            --transition: 0.25s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-attachment: fixed;
            position: relative;
        }

        /* Декоративные круги – скрыты на мобильных, появляются на десктопе */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
            display: none;
        }

        .hub {
            width: 100%;
            max-width: 920px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 28px 20px 32px;
            box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border: 1px solid var(--card-border);
            transition: var(--transition);
            animation: fadeUp 0.6s ease both;
            position: relative;
            overflow: hidden;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hub-header {
            text-align: center;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .hub-header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e3a5f, #2b5b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            position: relative;
        }

        .hub-header h1::after {
            content: '';
            display: block;
            margin: 6px auto 0;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
            border-radius: 4px;
            opacity: 0.5;
        }

        .hub-header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 10px;
            opacity: 0.8;
            font-weight: 400;
        }

        /* Сетка – одна колонка на мобильных */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 24px 20px 22px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Лёгкое увеличение при нажатии (для мобильных) */
        .card:active {
            transform: scale(0.97);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 30%, var(--primary-light) 50%, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }

        .card-icon {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(59, 130, 246, 0.02));
            transition: background var(--transition), transform var(--transition);
            flex-shrink: 0;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            opacity: 0.8;
            max-width: 220px;
            margin: 2px 0 10px;
        }

        .card-badge {
            margin-top: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
            padding: 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(59, 130, 246, 0.12);
            transition: background var(--transition), color var(--transition);
        }

        /* Цветовые вариации */
        .card.pm04 .card-icon {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(59, 130, 246, 0.04));
        }
        .card.pm11 .card-icon {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(139, 92, 246, 0.04));
        }
        .card.pm11s .card-icon {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.12), rgba(236, 72, 153, 0.04));
        }

        .footer-note {
            margin-top: 32px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0.4;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 16px;
            position: relative;
            z-index: 1;
        }

        /* ----- Tablet and Desktop (≥ 600px) ----- */
        @media (min-width: 600px) {
            body {
                padding: 24px;
            }

            .hub {
                padding: 36px 36px 44px;
                border-radius: 32px;
            }

            .hub-header h1 {
                font-size: 2.6rem;
            }
            .hub-header p {
                font-size: 1rem;
            }

            .cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 24px;
            }

            .card {
                padding: 32px 24px 28px;
                border-radius: 24px;
            }

            .card-icon {
                font-size: 3.2rem;
                width: 80px;
                height: 80px;
            }

            .card-title {
                font-size: 1.8rem;
            }

            .card-desc {
                font-size: 0.95rem;
            }

            .card-badge {
                font-size: 0.75rem;
                padding: 5px 18px;
            }

            .footer-note {
                font-size: 0.8rem;
                margin-top: 36px;
            }

            /* Декоративные круги на десктопе */
            body::before,
            body::after {
                display: block;
            }
            body::before {
                width: 500px;
                height: 500px;
                background: #3b82f6;
                top: -150px;
                right: -100px;
                opacity: 0.2;
            }
            body::after {
                width: 400px;
                height: 400px;
                background: #8b5cf6;
                bottom: -100px;
                left: -80px;
                opacity: 0.18;
            }

            /* Ховер-эффекты только для настольных */
            .card:hover {
                transform: translateY(-6px) scale(1.01);
                box-shadow: var(--shadow-hover);
                border-color: transparent;
                background: white;
            }

            .card:hover::before {
                opacity: 1;
            }

            .card:hover .card-icon {
                transform: scale(1.05) rotate(-2deg);
            }

            .card:hover .card-badge {
                background: var(--primary);
                color: white;
                border-color: var(--primary);
            }

            .card:active {
                transform: scale(0.97);
            }
        }

        /* ----- Большие экраны (≥ 900px) ----- */
        @media (min-width: 900px) {
            .hub {
                padding: 44px 48px 52px;
                border-radius: 40px;
            }

            .hub-header h1 {
                font-size: 3rem;
            }

            .cards {
                gap: 30px;
            }

            .card {
                padding: 36px 28px 32px;
                border-radius: 28px;
            }

            .card-icon {
                font-size: 3.8rem;
                width: 90px;
                height: 90px;
            }

            .card-title {
                font-size: 2rem;
            }

            .footer-note {
                margin-top: 44px;
                padding-top: 20px;
            }
        }
    </style>
</head>
<body>

    <main class="hub">
        <div class="hub-header">
            <h1>📁 Хаб заданий</h1>
            <p>Выберите раздел для подготовки</p>
        </div>

        <div class="cards">
            <a href="pm04.html" class="card pm04">
                <span class="card-icon">📘</span>
                <div class="card-title">PM.04</div>
                <div class="card-desc">Базы данных и программирование</div>
                <span class="card-badge">Перейти →</span>
            </a>

            <a href="pm11.html" class="card pm11">
                <span class="card-icon">📊</span>
                <div class="card-title">PM.11</div>
                <div class="card-desc">Программное обеспечение</div>
                <span class="card-badge">Перейти →</span>
            </a>

            <a href="pm11s.html" class="card pm11s">
                <span class="card-icon">🧩</span>
                <div class="card-title">PM.11 Шпоры</div>
                <div class="card-desc">Шаблонные шпаргалки и алгоритмы</div>
                <span class="card-badge">Перейти →</span>
            </a>
        </div>

        <div class="footer-note">
            © 2026 · Учебные материалы
        </div>
    </main>

</body>
</html>
