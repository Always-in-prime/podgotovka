<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Хаб заданий</title>
    <style>
        /* Современный сброс и переменные */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #f0f6fe;
            --bg-end: #e0eaf5;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.6);
            --shadow-soft: 0 8px 32px rgba(0, 20, 40, 0.08);
            --shadow-hover: 0 20px 48px rgba(0, 20, 40, 0.18);
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --text-dark: #0b2a41;
            --text-muted: #3d5a73;
            --radius: 32px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            background-attachment: fixed;
            position: relative;
        }

        /* Декоративный фон (размытые круги) */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            z-index: -1;
            pointer-events: none;
        }
        body::before {
            width: 600px;
            height: 600px;
            background: #3b82f6;
            top: -200px;
            right: -150px;
        }
        body::after {
            width: 500px;
            height: 500px;
            background: #8b5cf6;
            bottom: -150px;
            left: -100px;
        }

        .hub {
            max-width: 920px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: 44px 44px 52px;
            box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid var(--card-border);
            transition: var(--transition);
            animation: fadeUp 0.8s ease both;
            position: relative;
            overflow: hidden;
        }

        /* Лёгкий блеск в углу */
        .hub::after {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 260px;
            height: 260px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .hub-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .hub-header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e3a5f, #2b5b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            position: relative;
        }

        .hub-header h1::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 10%;
            width: 80%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
            border-radius: 4px;
            opacity: 0.5;
        }

        .hub-header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 12px;
            font-weight: 400;
            opacity: 0.85;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 28px;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px 28px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
        }

        /* Градиентная рамка при наведении */
        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 24px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 30%, var(--primary-light) 50%, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: var(--shadow-hover);
            border-color: transparent;
            background: white;
        }

        .card-icon {
            font-size: 3.8rem;
            line-height: 1;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(59, 130, 246, 0.02));
            transition: background var(--transition), transform var(--transition);
        }

        .card:hover .card-icon {
            transform: scale(1.05) rotate(-2deg);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(59, 130, 246, 0.05));
        }

        .card-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            opacity: 0.8;
            max-width: 200px;
            margin: 4px 0 12px;
        }

        .card-badge {
            margin-top: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
            padding: 5px 18px;
            border-radius: 30px;
            border: 1px solid rgba(59, 130, 246, 0.12);
            transition: background var(--transition), color var(--transition);
        }

        .card:hover .card-badge {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Специфичные оттенки для разных карточек */
        .card.pm04 .card-icon {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(59, 130, 246, 0.04));
        }
        .card.pm11 .card-icon {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.12), rgba(139, 92, 246, 0.04));
        }
        .card.pm11s .card-icon {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.12), rgba(236, 72, 153, 0.04));
        }

        .card.pm04:hover .card-icon {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.08));
        }
        .card.pm11:hover .card-icon {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.08));
        }
        .card.pm11s:hover .card-icon {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.2), rgba(236, 72, 153, 0.08));
        }

        .footer-note {
            margin-top: 44px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            opacity: 0.4;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 20px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 600px) {
            .hub {
                padding: 28px 20px 32px;
                border-radius: 28px;
            }
            .hub-header h1 {
                font-size: 2.4rem;
            }
            .cards {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .card {
                padding: 28px 20px 24px;
            }
            .card-icon {
                width: 70px;
                height: 70px;
                font-size: 3.2rem;
            }
        }

        /* Эффект "пульсации" для иконок при первом появлении */
        .card:nth-child(1) .card-icon { animation: pulse 2s ease-in-out infinite 0.5s; }
        .card:nth-child(2) .card-icon { animation: pulse 2s ease-in-out infinite 0.8s; }
        .card:nth-child(3) .card-icon { animation: pulse 2s ease-in-out infinite 1.1s; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
    </style>
</head>
<body>

    <main class="hub">
        <div class="hub-header">
            <h1>📁 Хаб заданий</h1>
            <p>Выберите раздел для подготовки</p>
        </div>

        <div class="cards">
            <a href="pm04.html" class="card pm04">
                <span class="card-icon">📘</span>
                <div class="card-title">PM.04</div>
                <div class="card-desc">Базы данных и программирование</div>
                <span class="card-badge">Перейти →</span>
            </a>

            <a href="pm11.html" class="card pm11">
                <span class="card-icon">📊</span>
                <div class="card-title">PM.11</div>
                <div class="card-desc">Программное обеспечение</div>
                <span class="card-badge">Перейти →</span>
            </a>

            <a href="pm11s.html" class="card pm11s">
                <span class="card-icon">🧩</span>
                <div class="card-title">PM.11 Шпоры</div>
                <div class="card-desc">Шаблонные шпаргалки и алгоритмы</div>
                <span class="card-badge">Перейти →</span>
            </a>
        </div>

        <div class="footer-note">
            © 2026 · Учебные материалы
        </div>
    </main>

</body>
</html>
