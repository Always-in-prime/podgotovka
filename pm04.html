<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Шпаргалка по ПО – 30 вопросов</title>
    <style>
        /* ----- Mobile First ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-start: #f0f6fe;
            --bg-end: #e0eaf5;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.5);
            --shadow-soft: 0 4px 20px rgba(0, 20, 40, 0.06);
            --shadow-hover: 0 8px 32px rgba(0, 20, 40, 0.12);
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --text-dark: #0b2a41;
            --text-muted: #3d5a73;
            --radius: 20px;
            --transition: 0.25s ease;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            background-attachment: fixed;
            padding: 16px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius);
            padding: 24px 18px 32px;
            box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid var(--card-border);
            transition: var(--transition);
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3a5f, #2b5b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            position: relative;
            letter-spacing: -0.02em;
        }

        .header h1::after {
            content: '';
            display: block;
            margin: 6px auto 0;
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
            border-radius: 4px;
            opacity: 0.5;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 8px;
            opacity: 0.8;
        }

        /* Поиск и фильтры */
        .filters {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filters input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2eaf2;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            font-size: 1rem;
            transition: border-color var(--transition), box-shadow var(--transition);
            outline: none;
        }

        .filters input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .filters .count {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            opacity: 0.7;
        }

        /* Сетка карточек – одна колонка на мобильных */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 4px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 18px 18px 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }

        .card:active {
            transform: scale(0.98);
        }

        /* Градиентная рамка при наведении (только на десктопе) */
        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 30%, var(--primary-light) 50%, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity var(--transition);
            pointer-events: none;
        }

        .card-number {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
            border-radius: 20px;
            padding: 2px 12px;
            display: inline-block;
            width: fit-content;
            margin-bottom: 8px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .card-short {
            font-size: 0.92rem;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 12px;
            color: var(--text-dark);
        }

        .btn-detail {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background var(--transition), transform var(--transition);
            align-self: flex-start;
            touch-action: manipulation;
        }

        .btn-detail:active {
            transform: scale(0.95);
        }

        /* Модальное окно – занимает почти весь экран на мобильных */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            justify-content: center;
            align-items: flex-end;
            padding: 16px;
            animation: modalFadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            background: white;
            border-radius: 24px 24px 0 0;
            max-width: 700px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            padding: 28px 24px 32px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: slideUp 0.3s ease both;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: #94a3b8;
            line-height: 1;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 4px 8px;
        }

        .close-btn:hover {
            color: #1e293b;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-dark);
            padding-right: 40px;
        }

        .modal-full {
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-dark);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .modal-examples {
            margin-top: 20px;
            padding: 16px 18px;
            background: #f1f5f9;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .modal-examples h4 {
            margin-bottom: 6px;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .modal-examples ul {
            margin: 6px 0 0 18px;
            padding: 0;
        }

        .modal-examples li {
            margin-bottom: 4px;
        }

        .no-results {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
            opacity: 0.7;
            font-size: 1.1rem;
        }

        /* ----- Tablet and Desktop (≥ 600px) ----- */
        @media (min-width: 600px) {
            body {
                padding: 24px;
                align-items: center;
            }

            .container {
                padding: 32px 36px 40px;
                border-radius: 28px;
            }

            .header h1 {
                font-size: 2.4rem;
            }

            .filters {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
            }

            .filters input {
                max-width: 400px;
            }

            .filters .count {
                font-size: 0.9rem;
            }

            .cards-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 20px;
            }

            .card {
                padding: 20px 22px 18px;
                border-radius: 18px;
            }

            .card:hover {
                transform: translateY(-4px);
                box-shadow: var(--shadow-hover);
                border-color: transparent;
                background: white;
            }

            .card:hover::before {
                opacity: 1;
            }

            .btn-detail:hover {
                background: #1d4ed8;
            }

            .modal {
                align-items: center;
                padding: 24px;
            }

            .modal-content {
                border-radius: 28px;
                max-height: 85vh;
                padding: 32px 36px 36px;
            }

            .modal-title {
                font-size: 1.6rem;
            }
        }

        /* ----- Large screens (≥ 900px) ----- */
        @media (min-width: 900px) {
            .container {
                padding: 40px 48px 48px;
                border-radius: 32px;
            }

            .header h1 {
                font-size: 2.8rem;
            }

            .cards-grid {
                gap: 24px;
            }

            .card {
                padding: 24px 26px 22px;
                border-radius: 20px;
            }

            .card-short {
                font-size: 0.95rem;
            }

            .modal-content {
                padding: 36px 44px 40px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📘 Шпаргалка по сопровождению ПО</h1>
        <p>30 углублённых ответов для экзамена</p>
    </div>

    <!-- Поиск и счётчик -->
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Фильтр по ключевым словам..." />
        <span class="count" id="countDisplay">Показано: 30</span>
    </div>

    <div id="cards" class="cards-grid"></div>
</div>

<!-- Модальное окно -->
<div id="modal" class="modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-full" id="modalFull"></div>
        <div class="modal-examples" id="modalExamples" style="display:none;">
            <h4>📌 Примеры</h4>
            <ul id="examplesList"></ul>
        </div>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // ДАННЫЕ (30 вопросов) – без изменений
    // ------------------------------------------------------------
    const data = [
        { number: 1, short: "Совокупность программ, данных и документации. Классификация: системное (ОС, драйверы), прикладное (офис, СУБД), инструментальное (компиляторы).", full: "Программное обеспечение (ПО) компьютерных систем — это комплекс программ, данных и сопутствующей документации, обеспечивающий решение задач на ЭВМ. Классификация: 1) системное ПО (операционные системы, драйверы, утилиты) — обеспечивает базовое функционирование; 2) прикладное ПО (офисные пакеты, СУБД, ERP, игры) — решает задачи пользователя; 3) инструментальное ПО (средства разработки, компиляторы, отладчики) — используется для создания новых программ. ПО также делится на проприетарное, свободное и открытое." },
        { number: 2, short: "Перевод системы в промышленную эксплуатацию: установка, миграция данных, обучение пользователей, приёмка.", full: "Внедрение ПО — это комплекс организационных и технических мероприятий по вводу разработанного или приобретённого ПО в повседневную работу организации. Основные этапы: планирование внедрения (составление графика, назначение ответственных), подготовка инфраструктуры (серверы, сеть, рабочие станции), инсталляция и настройка, миграция данных из старых систем (ETL-процессы), обучение пользователей и технического персонала, опытная эксплуатация (пилотный проект), приёмочные испытания и ввод в промышленную эксплуатацию. Важен документооборот: акты, инструкции, регламенты." },
        { number: 3, short: "Установка ПО с носителя или из репозитория, конфигурирование параметров (язык, логины, подключения).", full: "Инсталляция — процесс размещения программных файлов на целевой системе с созданием необходимых записей в реестре (Windows) или конфигурационных файлах (Linux). Настройка (конфигурация) — задание параметров работы ПО: локализация, настройка сетевых соединений, параметров безопасности, пулов подключений к БД, интеграция с другими системами. Может выполняться через интерактивные мастера, файлы конфигурации (XML, JSON, YAML) или скрипты автоматизации (Ansible, PowerShell). Важно задокументировать все изменённые настройки для последующего сопровождения." },
        { number: 4, short: "Действия по устранению сбоев, обновлению и обеспечению работоспособности в течение жизненного цикла.", full: "Поддержка и обслуживание ПО — это совокупность операций, направленных на сохранение и восстановление работоспособности системы после её ввода в эксплуатацию. Включает: мониторинг производительности и доступности, обработку инцидентов (service desk), установку обновлений и патчей безопасности, резервное копирование и восстановление данных, плановые профилактические работы (перезагрузка, очистка логов), а также техническую поддержку пользователей (консультирование, помощь в работе). Обслуживание регламентируется соглашением об уровне обслуживания (SLA)." },
        { number: 5, short: "Модификация ПО после поставки для исправления ошибок, адаптации или улучшения. Задачи: корректирующее, адаптивное, совершенствующее сопровождение.", full: "Сопровождение ПО — это процесс внесения изменений в уже работающую систему с целью устранения дефектов, адаптации к новой среде или добавления новых функций. Выделяют четыре вида сопровождения (по классификации IEEE): 1) корректирующее (исправление ошибок); 2) адаптивное (изменение под новое окружение — ОС, оборудование, версии БД); 3) совершенствующее (добавление новых возможностей, улучшение производительности); 4) профилактическое (рефакторинг, улучшение сопровождаемости). Основные задачи: анализ запросов изменений, планирование релизов, управление версиями, тестирование регрессии, выпуск новых версий и их развёртывание." },
        { number: 6, short: "Управление версиями (Git), резервное копирование, документирование изменений, создание тестовой среды.", full: "Технические вопросы сопровождения касаются инфраструктуры и инструментов: 1) система контроля версий (Git, SVN) для хранения исходного кода и истории изменений; 2) резервное копирование конфигураций, баз данных и артефактов сборки; 3) ведение документации (технической, пользовательской, API-документации) и её актуализация; 4) создание изолированных сред разработки, тестирования и стейджинга для безопасного внесения изменений; 5) автоматизация сборки, тестирования и развёртывания (CI/CD); 6) мониторинг и логирование для выявления проблем. Важна также политика управления конфигурациями (Configuration Management)." },
        { number: 7, short: "Этапы: запрос → анализ → реализация → тестирование → релиз → оценка. Итеративный цикл.", full: "Процесс сопровождения состоит из следующих этапов: 1) Запрос на изменение (заявка пользователя или обнаруженная ошибка); 2) Анализ и оценка (определение влияния, трудоёмкости, приоритета); 3) Реализация (разработка изменений в коде, конфигурации или документации); 4) Тестирование (модульное, интеграционное, регрессионное, приёмочное); 5) Релиз (подготовка пакета обновления, его развёртывание в продуктивной среде); 6) Оценка (сбор обратной связи, проверка успешности изменений). Процесс обычно итеративный и документируется в системах отслеживания задач (Jira, Redmine). В критических системах применяются формальные процессы (например, ГОСТ Р ИСО/МЭК 12207)." },
        { number: 8, short: "Реинжиниринг — переработка кода для повышения качества; обратный инжиниринг — восстановление спецификаций из готового кода.", full: "Реинжиниринг (re-engineering) — это фундаментальная переработка существующего ПО с целью улучшения его структуры, производительности и сопровождаемости, без изменения внешнего поведения. Включает рефакторинг, переписывание модулей, замену устаревших библиотек. Обратный инжиниринг (reverse engineering) — процесс анализа готового кода (или исполняемого файла) для восстановления проектных решений, архитектуры, алгоритмов и документации. Применяется для понимания legacy-систем, миграции на новые платформы, а также в целях безопасности (анализ вредоносного ПО). Инструменты: дизассемблеры, декомпиляторы, средства построения диаграмм." },
        { number: 9, short: "Комплекс мер по предотвращению несанкционированного доступа, копирования, модификации и разрушения ПО.", full: "Защита ПО — это совокупность правовых, организационных и программно-технических мер, направленных на обеспечение целостности, конфиденциальности и доступности программных продуктов, а также их законного использования. Включает: защиту от несанкционированного доступа (аутентификация, авторизация), защиту от копирования (лицензионные ключи, DRM), защиту от модификации (контроль целостности, цифровые подписи), защиту от деструктивных воздействий (антивирусы, межсетевые экраны), а также правовую защиту (авторские права, патенты, лицензионные соглашения)." },
        { number: 10, short: "Вирусы, трояны, фишинг, DDoS, эксплуатация уязвимостей. Примеры: WannaCry, SQL-инъекции, атаки на цепочку поставок.", full: "Угрозы безопасности ПО реализуются через различные векторы: 1) Вредоносное ПО (вирусы, черви, трояны, программы-вымогатели) — например, WannaCry (2017). 2) Сетевые атаки — DDoS, MITM, переполнение буфера, SQL-инъекции, XSS. 3) Социальная инженерия — фишинг, выдача себя за сотрудника поддержки. 4) Внутренние угрозы — злоумышленные или неосторожные действия персонала. 5) Уязвимости «нулевого дня» в ОС или приложениях. 6) Атаки на цепочку поставок — компрометация обновлений через поставщиков (пример: SolarWinds). Реализация угроз ведёт к утечке данных, нарушению работы, финансовым потерям и репутационному ущербу." },
        { number: 11, short: "Технологическая безопасность — защита от сбоев оборудования; эксплуатационная — от ошибочных действий оператора. Обеспечиваются резервированием, контролем целостности, инструктажем.", full: "Технологическая безопасность ПО — это способность системы противостоять аппаратным сбоям, сбоям в электропитании, сетевых протоколах и т.п. Обеспечивается резервированием (кластеризация, RAID), контрольными точками (checkpointing), автоматическим восстановлением после падений. Эксплуатационная безопасность — предотвращение ошибок оператора, неправильной конфигурации, неосознанных действий. Достигается: 1) строгими инструкциями и регламентами; 2) разделением прав доступа; 3) контролем входных данных; 4) логированием всех действий с возможностью аудита; 5) обучением персонала. Оба аспекта важны для надёжности и непрерывности." },
        { number: 12, short: "Модель угроз описывает активы, злоумышленников и возможные атаки. Принципы: наименьшие привилегии, защита в глубину, безопасность по умолчанию.", full: "Модель угроз — это формализованное описание защищаемых активов (данные, код, инфраструктура), потенциальных нарушителей (их возможности и цели), уязвимостей и способов атак. Строится по методологии STRIDE (Spoofing, Tampering, Repudiation, Information disclosure, DoS, Elevation of privilege). Основные принципы обеспечения безопасности: 1) принцип минимальных привилегий — каждый субъект получает только необходимые права; 2) эшелонированная (глубокая) защита — несколько последовательных уровней защиты; 3) безопасность по умолчанию — наиболее безопасная конфигурация установлена изначально; 4) разделение обязанностей — ни один человек не обладает полным доступом; 5) регулярный аудит и мониторинг." },
        { number: 13, short: "Математическое доказательство соответствия программы спецификации с использованием формальной логики (Хоар, Coq, TLA+).", full: "Формальные методы — это применение математической логики и дискретной математики для спецификации, разработки и верификации программ. Цель — строго доказать, что программа соответствует своей спецификации. Используются: логика Хоара (предусловия, постусловия, инварианты), λ-исчисление, теория типов. Инструменты: Coq, Isabelle/HOL, TLA+, SPARK Ada. Применяются в критических системах (авионика, ядерная энергетика, медицинские приборы). Требуют высокой квалификации и трудоёмки, но дают наивысший уровень гарантии корректности." },
        { number: 14, short: "Анализ безопасности: статический (SAST, анализ кода), динамический (DAST, сканирование работающего приложения) и пентест.", full: "Методы и средства анализа безопасности: 1) Статический анализ (SAST) — проверка исходного кода на наличие уязвимостей без выполнения программы (SonarQube, Fortify, PVS-Studio). Выявляет ошибки: переполнение буфера, SQL-инъекции, небезопасное использование функций. 2) Динамический анализ (DAST) — сканирование работающего приложения, например, веб-сканерами (Burp Suite, OWASP ZAP). Обнаруживает проблемы конфигурации, недоступные статике. 3) Тестирование на проникновение (пентест) — моделирование атак «белыми хакерами» для проверки реальной защищённости. 4) Анализ зависимостей (SCA) — проверка библиотек на известные уязвимости (WhiteSource, Snyk). Комбинация методов даёт наиболее полную картину." },
        { number: 15, short: "Обеспечение надёжности: обработка исключений, перезапуск, контроль ресурсов, использование watchdog-таймеров.", full: "Надёжность ПО — свойство сохранять работоспособность в условиях ошибок, сбоев и внешних воздействий. Методы: 1) обработка исключений (try-catch, конструкции finally) для корректного завершения; 2) механизмы самовосстановления — watchdog-таймеры, рестарт процессов, fallback-режимы; 3) контроль использования ресурсов (память, потоки, файловые дескрипторы) для предотвращения исчерпания; 4) избыточность — дублирование компонентов, резервные серверы; 5) изоляция ошибок — модульность, защита памяти; 6) корректное логирование для диагностики. Надёжность тестируется стресс-тестами, тестами на отказ и длительными прогонами." },
        { number: 16, short: "Проверка границ, санитизация входных данных, использование безопасных функций (strncpy вместо strcpy).", full: "Алгоритмически безопасные процедуры — это методы написания кода, предотвращающие возникновение уязвимостей. Основные приёмы: 1) проверка границ массивов и буферов (ни один индекс не выходит за пределы); 2) санитизация (фильтрация и экранирование) входных данных для предотвращения инъекций (SQL, XSS, OS command); 3) использование безопасных функций стандартной библиотеки (strncpy, snprintf, fgets вместо gets); 4) валидация форматов данных (JSON Schema, XML Schema); 5) использование параметризованных запросов к БД; 6) ограничение прав на уровне операционной системы (выполнение в изолированной среде). Регулярные код-ревью и статические анализаторы помогают выявлять нарушения этих правил." },
        { number: 17, short: "Рандомизация адресного пространства (ASLR), проверка хешей исполняемых файлов, защита от вставки кода.", full: "Защита от автоматической генерации закладок инструментальными средствами (например, компиляторами) включает: 1) рандомизацию адресного пространства (ASLR) — случайное расположение кода и данных в памяти, что мешает использовать фиксированные адреса для внедрения; 2) защиту стека (stack canaries) — предотвращение переполнения стека; 3) исполнение кода только в разрешённых областях памяти (NX-бит, DEP); 4) проверку целостности исполняемых файлов (хеширование, цифровые подписи) перед запуском, чтобы обнаружить модификации; 5) обфускацию кода, усложняющую его анализ. Эти меры применяются как на этапе компиляции, так и на этапе загрузки ОС." },
        { number: 18, short: "Идентификация по хеш-сумме (MD5, SHA), цифровой подписи, уникальному идентификатору (GUID) и метаданным.", full: "Методы идентификации программ и их характеристик служат для однозначного распознавания ПО и контроля его подлинности. Используются: 1) криптографические хеш-функции (MD5, SHA-1, SHA-256) — вычисление контрольной суммы файла; 2) электронно-цифровая подпись (на основе открытых ключей) — подтверждает авторство и целостность; 3) уникальные идентификаторы (GUID, UUID), присваиваемые поставщиком; 4) метаданные (имя, версия, размер, дата создания); 5) отпечатки (фingerprints) на основе структуры исполняемого файла (PE-заголовки для Windows, ELF для Linux). Эти данные используются в системах инвентаризации, обновления и контроля лицензий." },
        { number: 19, short: "Антивирусы с сигнатурным и поведенческим анализом, эвристические методы, регулярное сканирование и обновление баз.", full: "Защита от компьютерных вирусов реализуется комплексно: 1) антивирусное ПО — комбинация сигнатурного (поиск известных фрагментов кода) и поведенческого (анализ действий программы) методов; 2) эвристический анализ для обнаружения новых, неизвестных вирусов; 3) регулярное обновление антивирусных баз; 4) встроенные средства ОС (Windows Defender, AppLocker); 5) политики запуска приложений (белые списки); 6) мониторинг системных вызовов и реестра; 7) обучение пользователей правилам безопасной работы (не открывать подозрительные вложения). Для критических сред применяются песочницы (sandbox) для изолированного выполнения." },
        { number: 20, short: "Мониторинг целостности (Tripwire), аудит доступа, системы обнаружения вторжений (IDS) и контроль изменений.", full: "Защита от внедрения закладок на этапе эксплуатации и сопровождения включает: 1) системы обнаружения вторжений (IDS/IPS) на сетевом и хостовом уровне; 2) контроль целостности критичных файлов (Tripwire, AIDE) — сравнение хешей с эталонными; 3) ведение подробных журналов аудита (логи доступа, изменения конфигураций, запуски процессов) и их регулярный анализ; 4) системы управления конфигурациями, фиксирующие все изменения; 5) ограничение физического доступа к серверам; 6) использование доверенных загрузчиков и безопасных сред выполнения. Также важны процедуры проверки обновлений перед их установкой в продуктивной среде." },
        { number: 21, short: "Проверка цифровых подписей, контрольных сумм, использование доверенных репозиториев и сертифицированных поставщиков.", full: "Обеспечение целостности и достоверности используемого кода — это гарантия того, что код не был изменён и его происхождение подтверждено. Методы: 1) верификация цифровых подписей (GPG, Authenticode) для установочных файлов; 2) вычисление и сверка контрольных сумм (SHA-256) с официальными источниками; 3) использование доверенных репозиториев (официальные репозитории дистрибутивов Linux, магазины приложений); 4) сканирование кода на наличие вредоносных вставок; 5) проверка поставщиков на соответствие стандартам безопасности (например, SOC 2); 6) процедуры безопасной доставки (SSL/TLS, кодовые подписи). В государственных системах часто требуется сертификация ФСТЭК или аналогичных органов." },
        { number: 22, short: "Лицензионные ключи, аппаратные ключи (HASP), привязка к устройствам, онлайн-активация, DRM-системы.", full: "Основные подходы к защите от несанкционированного копирования: 1) серийные номера и лицензионные ключи, которые вводятся при установке; 2) аппаратные ключи (USB-токены HASP, eToken) — физические устройства с уникальным кодом; 3) привязка к характеристикам компьютера (MAC-адрес, серийный номер жёсткого диска, процессора) с генерацией машинно-зависимого ключа; 4) онлайн-активация через сервер производителя (требует подключения к Интернету); 5) системы управления цифровыми правами (DRM), ограничивающие использование, копирование и распространение; 6) облачные модели (SaaS), где код не передаётся пользователю, что практически исключает копирование." },
        { number: 23, short: "Человеческий фактор — ошибки, социальная инженерия, недостаток компетенций. Минимизируется обучением, чёткими инструкциями и политиками безопасности.", full: "Человеческий фактор — одна из главных уязвимостей в безопасности ПО. Проявляется в: 1) ошибках при конфигурации и эксплуатации; 2) поддавании на фишинг и социальную инженерию; 3) неосторожном обращении с паролями и ключами; 4) недостатке знаний о современных угрозах; 5) игнорировании регламентов. Способы снижения рисков: регулярное обучение и тренировки (в том числе на учебных атаках), создание чётких и понятных инструкций, внедрение политик безопасности (парольная политика, двухфакторная аутентификация), использование автоматизированных средств для минимизации ручных операций, а также психологическое тестирование персонала для работы с критическими данными." },
        { number: 24, short: "Организационные средства — регламенты, инструкции, разделение обязанностей, политики безопасности, аттестация сотрудников.", full: "Организационные средства защиты включают: 1) разработку и внедрение политики безопасности (информационной безопасности); 2) разделение обязанностей между сотрудниками (никто не обладает всеми правами); 3) регламенты и инструкции по работе с ПО, по установке и обновлениям; 4) процедуры приёма на работу и увольнения (отзыв доступа); 5) планы реагирования на инциденты; 6) регулярные проверки и аудиты безопасности; 7) аттестацию и сертификацию персонала по информационной безопасности; 8) физическую защиту помещений и оборудования. Эти меры составляют основу системы менеджмента информационной безопасности (СМИБ) и часто требуются по стандартам ISO 27001." },
        { number: 25, short: "Локальная защита — пароль BIOS, шифрование диска (BitLocker), антивирус, политики локальных групповых политик (GPO).", full: "Локальная программная защита реализуется на отдельном компьютере: 1) установка пароля на BIOS/UEFI для предотвращения загрузки с внешних носителей; 2) шифрование всего системного диска (BitLocker, VeraCrypt) для защиты данных при физическом доступе; 3) использование антивируса и брандмауэра; 4) настройка локальных политик (GPO в Windows) — ограничение установки ПО, настройка UAC, запрет USB-устройств; 5) регулярное обновление ОС и приложений через WSUS или локальный репозиторий; 6) использование защищённых хранилищ паролей; 7) настройка экранной заставки с блокировкой через короткое время бездействия. Все эти меры важны для рабочих станций и ноутбуков." },
        { number: 26, short: "Сетевая защита — межсетевые экраны (iptables, pfSense), VPN, шифрование трафика (TLS/SSL), IDS/IPS, сегментация сетей.", full: "Сетевая программная защита направлена на безопасность передачи данных и защиту от сетевых атак. Основные средства: 1) межсетевые экраны (firewall) — фильтрация пакетов на основе правил (iptables, pfSense, аппаратные фаерволы); 2) виртуальные частные сети (VPN) — шифрование всего трафика между удалёнными узлами; 3) шифрование каналов (TLS/SSL) для защиты данных в Интернете (HTTPS, FTPS); 4) системы обнаружения и предотвращения вторжений (IDS/IPS) — Snort, Suricata; 5) сегментация сети (VLAN, DMZ) для изоляции критических компонентов; 6) защита от DDoS — использование анти-DDoS-сервисов; 7) контроль доступа на уровне портов и протоколов. Все сервисы должны проходить регулярные сканирования на уязвимости." },
        { number: 27, short: "Использование специальных технологий на компакт-дисках (SafeDisc, SecuROM), затрудняющих копирование, путём создания физических дефектов или специфической структуры.", full: "Защита при помощи компакт-дисков применялась в эпоху распространения физических носителей. Технологии: 1) SafeDisc — запись специального цифрового водяного знака на диск, который проверяется при запуске; 2) SecuROM — использование повреждённых секторов или нестандартных форматов, которые трудно скопировать обычными средствами; 3) защита от копирования на уровне драйвера, мешающая чтению данных стандартными программами; 4) связывание диска с уникальным идентификатором, который должен присутствовать в приводе. Однако эти методы легко обходятся современными эмуляторами и не используются в серьёзных современных продуктах, уступив место онлайн-активации." },
        { number: 28, short: "Аппаратные ключи (USB-токены HASP, Sentinel) содержат уникальный идентификатор и выполняют криптографические операции, без которых ПО не запускается.", full: "Защита электронными ключами (аппаратными токенами) — один из самых надёжных методов. Ключ подключается к компьютеру (через USB, LPT, PCI) и содержит уникальный идентификатор, а иногда и микропроцессор для выполнения криптографических функций. Примеры: HASP (Aladdin), Sentinel (SafeNet), eToken. При запуске программа посылает запрос к ключу, тот вычисляет ответ на основе внутреннего алгоритма и секретного ключа. Без правильного ответа программа не работает. Преимущества: высокая стойкость к взлому, невозможность клонирования. Недостатки: физический носитель может быть потерян или повреждён, требуется поддержка драйверов." },
        { number: 29, short: "Программа запоминает параметры железа (MAC, HDD ID, CPU ID) и генерирует уникальный ключ; активация по сети или по телефону.", full: "Привязка к параметрам компьютера и активация — метод, при котором лицензия привязывается к конкретному оборудованию. При установке программа собирает информацию: MAC-адрес сетевой карты, серийный номер жёсткого диска, идентификатор процессора, материнской платы, объём ОЗУ и т.д. Затем генерируется хеш (например, «код аппаратной привязки»), который пользователь отправляет производителю для получения ключа активации. Активация может быть онлайн (автоматически) или через телефон (ввод ответного кода). После смены оборудования требуется реактивация. Этот метод широко применяется в коммерческом ПО (Windows, AutoCAD, 1С)." },
        { number: 30, short: "Переход к облачным сервисам (SaaS): код находится у провайдера, пользователь получает доступ через браузер, копирование невозможно.", full: "Защита путём переноса в онлайн (SaaS — Software as a Service) кардинально решает проблему копирования, поскольку программа не устанавливается на компьютере пользователя. Весь код и данные хранятся на серверах провайдера, доступ осуществляется через веб-браузер или тонкий клиент. Пользователь платит за подписку и не имеет физического доступа к исполняемым файлам, что исключает их копирование и распространение. Дополнительные преимущества: централизованные обновления, масштабируемость, доступность с любого устройства. Примеры: Google Docs вместо MS Office, облачные 1С, Salesforce, SaaS-системы управления проектами. Недостатки: зависимость от Интернета и провайдера, риски утечки данных в облаке." }
    ];

    // ------------------------------------------------------------
    // Рендеринг, поиск, модальное окно
    // ------------------------------------------------------------
    const cardsContainer = document.getElementById('cards');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalFull = document.getElementById('modalFull');
    const modalExamples = document.getElementById('modalExamples');
    const examplesList = document.getElementById('examplesList');
    const searchInput = document.getElementById('searchInput');
    const countDisplay = document.getElementById('countDisplay');

    function renderCards(filterText = '') {
        const text = filterText.toLowerCase().trim();
        let visible = 0;
        cardsContainer.innerHTML = '';

        data.forEach(item => {
            const searchData = (item.short + ' ' + item.full).toLowerCase();
            if (text && !searchData.includes(text)) return;

            visible++;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-number">Вопрос ${item.number}</div>
                <div class="card-short">${item.short}</div>
                <button class="btn-detail" data-id="${item.number}">Подробнее →</button>
            `;
            cardsContainer.appendChild(card);
        });

        countDisplay.textContent = `Показано: ${visible}`;

        // Навешиваем обработчики на кнопки (делегирование)
        cardsContainer.querySelectorAll('.btn-detail').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = parseInt(this.dataset.id);
                openModal(id);
            });
        });
    }

    function openModal(id) {
        const item = data.find(d => d.number === id);
        if (!item) return;

        modalTitle.textContent = `Вопрос ${item.number}`;
        modalFull.textContent = item.full;

        const examples = extractExamples(item.full);
        if (examples.length > 0) {
            modalExamples.style.display = 'block';
            examplesList.innerHTML = examples.map(ex => `<li>${ex}</li>`).join('');
        } else {
            modalExamples.style.display = 'none';
        }

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function extractExamples(text) {
        const regex = /(?:Примеры?)\s*:\s*/i;
        const parts = text.split(regex);
        if (parts.length > 1) {
            let examplesPart = parts.slice(1).join(' ').trim();
            examplesPart = examplesPart.replace(/\.$/, '');
            let items = examplesPart.split(/[,;]\s*/).filter(s => s.length > 0);
            let result = [];
            items.forEach(item => {
                if (item.includes(' и ')) {
                    const sub = item.split(/\s+и\s+/);
                    result.push(...sub);
                } else {
                    result.push(item);
                }
            });
            result = result.map(s => s.trim().replace(/^[\s.]+/, '').replace(/[\s.]+$/, '')).filter(s => s.length > 0);
            return result;
        }
        return [];
    }

    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Поиск с задержкой (debounce)
    let searchTimeout;
    searchInput.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            renderCards(this.value);
        }, 200);
    });

    // Закрытие по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    // Инициализация
    renderCards();
</script>
</body>
</html>
